  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { createRoot } = ReactDOM;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip,
      ResponsiveContainer, Cell, PieChart, Pie, Legend, LineChart, Line } = Recharts;

    // ─── THEME ─────────────────────────────────────────────────────────────────
    const T = {
      bg: "#07090f", card: "#0f1520", card2: "#131d2e", border: "#1a2744",
      border2: "#223060", text: "#dde5f8", muted: "#4e6080", dim: "#273550",
      green: "#00d98b", red: "#ff3d5a", yellow: "#ffba08", blue: "#3b9eff",
      purple: "#8b6fff", orange: "#ff7849",
    };
    const PIE = [T.green, T.blue, T.yellow, T.purple, T.orange, T.red];
    const fmt$ = (n) => `$${Number(n || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    const fmtK = (n) => Math.abs(n) >= 1000 ? `$${(n / 1000).toFixed(1)}K` : fmt$(n);
    const fmtPct = (n) => `${Number(n || 0).toFixed(1)}%`;
    const sign = (n) => (n > 0 ? "+" : "");

    // ─── AI (multi-provider: Gemini free / Groq free / Claude paid) ────────────
    async function callAI(system, user) {
      const provider = localStorage.getItem("ai_provider") || "gemini";
      const apiKey = localStorage.getItem("ai_api_key") || "";
      if (!apiKey) return "⚠ No API key set. Click ⚙ AI Settings in the header to add your free API key.";

      try {
        if (provider === "gemini") {
          const r = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
            { method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ contents: [{ parts: [{ text: system + "\n\n" + user }] }], generationConfig: { maxOutputTokens: 1200 } }) }
          );
          const d = await r.json();
          if (d.error) return `⚠ Gemini Error: ${d.error.message}`;
          return d.candidates?.[0]?.content?.parts?.[0]?.text || "No response.";
        }

        if (provider === "groq") {
          const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
            body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "system", content: system }, { role: "user", content: user }], max_tokens: 1200 }),
          });
          const d = await r.json();
          if (d.error) return `⚠ Groq Error: ${d.error.message}`;
          return d.choices?.[0]?.message?.content || "No response.";
        }

        if (provider === "claude") {
          const r = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-allow-browser": "true" },
            body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1200, system, messages: [{ role: "user", content: user }] }),
          });
          const d = await r.json();
          if (d.error) return `⚠ Claude Error: ${d.error.message}`;
          return d.content?.[0]?.text || "No response.";
        }
      } catch (e) { return `⚠ Network Error: ${e.message}`; }
    }

    // ─── ODOO CLIENT ───────────────────────────────────────────────────────────
    class OdooClient {
      constructor(url, db, username, password) {
        this.url = url.replace(/\/$/, "");
        this.db = db; this.username = username; this.password = password; this.uid = null;
      }
      async _rpc(endpoint, params) {
        const r = await fetch(`${this.url}${endpoint}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jsonrpc: "2.0", method: "call", id: Date.now(), params }),
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}: ${r.statusText}`);
        const d = await r.json();
        if (d.error) throw new Error(d.error.data?.message || d.error.message || "Odoo RPC error");
        return d.result;
      }
      async authenticate() {
        const r = await this._rpc("/web/session/authenticate", {
          db: this.db, login: this.username, password: this.password,
        });
        if (!r?.uid) throw new Error("Authentication failed. Check your credentials.");
        this.uid = r.uid;
        return this.uid;
      }
      async searchRead(model, domain = [], fields = [], limit = 500, offset = 0) {
        return this._rpc("/web/dataset/call_kw", {
          model, method: "search_read",
          args: [domain],
          kwargs: { fields, limit, offset, context: { lang: "en_US" } },
        });
      }
      async fetchActuals(dateFrom, dateTo, groupBy = "account") {
        const lines = await this.searchRead(
          "account.move.line",
          [
            ["date", ">=", dateFrom], ["date", "<=", dateTo],
            ["parent_state", "=", "posted"],
            ["account_id.account_type", "in", ["expense", "income", "expense_direct_cost", "expense_depreciation"]],
            ["company_id.active", "=", true],
          ],
          ["account_id", "analytic_account_id", "debit", "credit", "name", "date", "move_id"], 2000
        );
        const grouped = {};
        for (const l of lines) {
          let key = (groupBy === "analytic" && l.analytic_account_id) ? l.analytic_account_id[1] : (l.account_id ? l.account_id[1] : "Unclassified");
          if (!grouped[key]) grouped[key] = { actual: 0, lines: [] };
          grouped[key].actual += (l.debit - l.credit);
          grouped[key].lines.push(l);
        }
        return Object.entries(grouped).filter(([, v]) => Math.abs(v.actual) > 0.01)
          .map(([category, v]) => ({ category, actual: Math.abs(v.actual), lineCount: v.lines.length }));
      }
    }

    // ─── VOICE ─────────────────────────────────────────────────────────────────
    function parseVoice(t) {
      const s = t.toLowerCase();
      if (s.match(/analyz|insights|explain|why|ai report/)) return { action: "analyze" };
      if (s.match(/fetch|sync|load|pull|get.*(odoo|actual|expense|live)/)) return { action: "fetchActuals" };
      if (s.match(/export.*excel|download.*excel/)) return { action: "exportExcel" };
      if (s.match(/export.*csv|download.*csv/)) return { action: "exportCsv" };
      if (s.match(/upload|import|open.*file|budget.*file/)) return { action: "uploadBudget" };
      const yearM = s.match(/(?:year|fetch|show)\s+(\d{4})/);
      if (yearM) return { action: "setYear", value: yearM[1] };
      const qM = s.match(/(?:quarter|q)\s*([1-4])\s*(?:of\s+)?(\d{4})?/);
      if (qM) return { action: "setQuarter", q: +qM[1], year: qM[2] || new Date().getFullYear() };
      return { action: "unknown" };
    }

    function VoiceMic({ onCommand }) {
      const [listening, setListening] = useState(false);
      const [supported] = useState(() => !!(window.SpeechRecognition || window.webkitSpeechRecognition));
      const [lastText, setLastText] = useState("");
      const recRef = useRef(null);
      useEffect(() => {
        if (!supported) return;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new SR();
        rec.continuous = false; rec.interimResults = true; rec.lang = "en-US";
        rec.onstart = () => setListening(true);
        rec.onend = () => setListening(false);
        rec.onerror = () => setListening(false);
        rec.onresult = (e) => {
          const txt = Array.from(e.results).map(r => r[0].transcript).join(" ");
          setLastText(txt);
          if (e.results[e.results.length - 1].isFinal) onCommand(parseVoice(txt), txt);
        };
        recRef.current = rec;
      }, []);
      function toggle() {
        if (!supported) return;
        if (listening) recRef.current?.stop();
        else { setLastText(""); try { recRef.current?.start(); } catch (_) {} }
      }
      if (!supported) return null;
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ position: "relative" }}>
            {listening && <>
              <div style={{ position: "absolute", inset: -6, borderRadius: "50%", border: `2px solid ${T.red}`, opacity: 0.5, animation: "vp 1.2s ease-out infinite" }} />
              <div style={{ position: "absolute", inset: -13, borderRadius: "50%", border: `2px solid ${T.red}`, opacity: 0.2, animation: "vp 1.2s ease-out infinite 0.5s" }} />
            </>}
            <button onClick={toggle} style={{ width: 38, height: 38, borderRadius: "50%", background: listening ? T.red : "rgba(255,255,255,0.07)", border: `2px solid ${listening ? T.red : T.border2}`, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, color: listening ? "#fff" : T.muted, transition: "all 0.2s" }}>
              {listening ? "⏹" : "🎤"}
            </button>
          </div>
          {lastText && <span style={{ color: listening ? T.yellow : T.muted, fontSize: 11, fontStyle: "italic", maxWidth: 180, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{listening ? "🔴 " : "✓ "}{lastText}</span>}
        </div>
      );
    }

    // ─── SHARED UI ─────────────────────────────────────────────────────────────
    const inp = { background: "rgba(255,255,255,0.04)", border: `1px solid ${T.border2}`, borderRadius: 7, padding: "9px 13px", color: T.text, fontSize: 13, outline: "none", width: "100%", fontFamily: "inherit" };

    function Btn({ children, onClick, variant = "primary", disabled, style = {}, title }) {
      const v = {
        primary: { background: T.green, color: "#07090f", border: "none" },
        secondary: { background: "rgba(255,255,255,0.05)", color: T.text, border: `1px solid ${T.border2}` },
        danger: { background: "rgba(255,61,90,0.1)", color: T.red, border: `1px solid rgba(255,61,90,0.25)` },
        odoo: { background: "#7C1919", color: "#fff", border: "none" },
        outline: { background: "transparent", color: T.blue, border: `1px solid ${T.blue}` },
      };
      return <button title={title} onClick={onClick} disabled={disabled} style={{ border: "none", borderRadius: 8, padding: "8px 16px", cursor: disabled ? "not-allowed" : "pointer", fontSize: 12.5, fontWeight: 700, fontFamily: "inherit", opacity: disabled ? 0.45 : 1, transition: "all 0.15s", letterSpacing: "0.01em", ...v[variant], ...style }}>{children}</button>;
    }

    function KPI({ label, value, sub, color, icon }) {
      return (
        <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: 12, padding: "16px 18px", flex: 1, minWidth: 130 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
            {icon && <span style={{ fontSize: 14 }}>{icon}</span>}
            <span style={{ color: T.muted, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em" }}>{label}</span>
          </div>
          <div style={{ color: color || T.text, fontSize: 22, fontWeight: 700, fontFamily: "monospace", letterSpacing: "-0.02em" }}>{value}</div>
          {sub && <div style={{ color: T.muted, fontSize: 11, marginTop: 4 }}>{sub}</div>}
        </div>
      );
    }

    function Badge({ children, color }) {
      const colors = { green: { bg: "rgba(0,217,139,0.1)", text: T.green }, red: { bg: "rgba(255,61,90,0.1)", text: T.red }, yellow: { bg: "rgba(255,186,8,0.1)", text: T.yellow }, blue: { bg: "rgba(59,158,255,0.1)", text: T.blue } };
      const c = colors[color] || colors.blue;
      return <span style={{ background: c.bg, color: c.text, padding: "3px 10px", borderRadius: 20, fontSize: 10, fontWeight: 700, letterSpacing: "0.05em" }}>{children}</span>;
    }

    function Spinner({ size = 14 }) {
      return <div style={{ width: size, height: size, border: `2px solid ${T.border2}`, borderTop: `2px solid ${T.green}`, borderRadius: "50%", animation: "spin 0.8s linear infinite", flexShrink: 0 }} />;
    }

    function AIBox({ content, loading }) {
      if (!content && !loading) return null;
      return (
